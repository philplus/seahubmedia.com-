<svg xmlns='http://www.w3.org/2000/svg' width='240' height='140' viewBox='0 0 240 140'>
  <style>
    .bar{fill:#0b6ef6}
    .b1{animation:bounce 1.6s ease-in-out infinite}
    .b2{animation:bounce 1.2s ease-in-out 0.2s infinite}
    .b3{animation:bounce 1.8s ease-in-out 0.4s infinite}
    @keyframes bounce{0%{transform:scaleY(0.4)}50%{transform:scaleY(1)}100%{transform:scaleY(0.6)}}
  </style>
  <rect width='240' height='140' rx='12' fill='#071226'/>
  <g transform='translate(34,28)'>
    <g transform='translate(0,40)'>
      <rect class='bar b1' x='0' y='0' width='28' height='56' rx='4' transform-origin='14px 56px'/>
      <rect class='bar b2' x='44' y='0' width='28' height='36' rx='4' transform-origin='58px 56px'/>
      <rect class='bar b3' x='88' y='0' width='28' height='76' rx='4' transform-origin='102px 56px'/>
      <rect class='bar b1' x='132' y='0' width='28' height='20' rx='4' transform-origin='146px 56px'/>
    </g>
  </g>
</svg>