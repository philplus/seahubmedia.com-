name: Daily memory read (PR)

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 4 * * *' # 11:00 Asia/Jakarta
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.email "phil+bot@example.com"
          git config user.name "seahub-bot"

      - name: Find yesterday changelog and copy to memory
        run: |
          Y=$(date -d "yesterday" +"%Y-%m-%d" || date -v-1d +"%Y-%m-%d")
          SRC=CHANGELOG-$Y.md
          if [ -f "$SRC" ]; then
            mkdir -p memory
            cp "$SRC" memory/$Y.md
            git add memory/$Y.md || true
            git commit -m "chore(ci): import $SRC -> memory/$Y.md [auto]" || true
          else
            echo "No changelog $SRC"
          fi

      - name: Create PR via action
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.REPO_WRITE_TOKEN }}
          commit-message: "chore(ci): daily memory read ${{ github.run_id }} [auto]"
          branch: "workflow/daily-memory-read/${{ github.run_id }}"
          title: "daily-memory-read: ${{ github.run_id }}"
          body: "Automated memory import; please review."
          base: main
