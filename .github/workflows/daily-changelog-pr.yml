name: Daily changelog (PR)

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 16 * * *' # 23:00 Asia/Jakarta
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.email "phil+bot@example.com"
          git config user.name "seahub-bot"

      - name: Generate changelog
        run: |
          DATE=$(date -I)
          FILE=CHANGELOG-$DATE.md
          echo "# CHANGELOG - $DATE" > "$FILE"
          git add "$FILE" || true
          git commit -m "chore(ci): generate daily changelog $DATE [auto]" || true

      - name: Create PR via action
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.REPO_WRITE_TOKEN }}
          commit-message: "chore(ci): daily changelog ${{ github.run_id }} [auto]"
          branch: "workflow/daily-changelog/${{ github.run_id }}"
          title: "daily-changelog: ${{ github.run_id }}"
          body: "Automated daily changelog; please review."
          base: main
