<svg xmlns='http://www.w3.org/2000/svg' width='240' height='140' viewBox='0 0 240 140'>
  <style>
    .node{fill:#0b6ef6}
    .link{stroke:#0b6ef6;stroke-opacity:0.12;stroke-width:2}
    .nd1{animation:float 4s ease-in-out infinite}
    .nd2{animation:float 3.2s ease-in-out 0.2s infinite}
    .nd3{animation:float 3.6s ease-in-out 0.4s infinite}
    @keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
  </style>
  <rect rx='12' width='240' height='140' fill='#071226'/>
  <g transform='translate(28,28)'>
    <line class='link' x1='20' y1='30' x2='120' y2='20'/>
    <line class='link' x1='120' y1='20' x2='180' y2='60'/>
    <circle class='node nd1' cx='20' cy='30' r='10'/>
    <circle class='node nd2' cx='120' cy='20' r='12'/>
    <circle class='node nd3' cx='180' cy='60' r='8'/>
    <rect x='8' y='80' width='160' height='18' rx='6' fill='#18324a'/>
  </g>
</svg>